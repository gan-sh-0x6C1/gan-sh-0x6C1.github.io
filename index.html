<!DOCTYPE HTML>
<HTML>
  <head>
    <title>Ganesh SK</title>
    <link rel="stylesheet" href="https://github.com/gan-sh-0x6C1/gan-sh-0x6C1.github.io/blob/main/styles.css"/>
    <style>
      /* Import Sofia font from Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Sofia&display=swap');

/* Reset and base styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    /* Apply Sofia as the primary font */
    font-family: 'Sofia', cursive, sans-serif;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    
    /* Live gradient background settings */
    background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764);
    background-size: 400% 400%;
    animation: gradientAnimation 15s ease infinite;
    
    overflow-x: hidden;
}

/* Keyframes for the live animated gradient */
@keyframes gradientAnimation {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

/* Example UI Card Component to complement the dark theme */
.card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 450px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #f472b6; /* Subtle pink accent to contrast the dark base */
    text-shadow: 0 0 10px rgba(244, 114, 182, 0.3);
}

p {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #cbd5e1;
}

/* Accessible preference handling: stops animation if user prefers reduced motion */
@media (prefers-reduced-motion: reduce) {
    body {
        animation: none;
        background-size: 100% 100%;
    }
}
    </style>
  </head>
  <body>
    <h1>H¡, I'm Ganesh</h1>
    <h2>CSE Sophomore at ASEB</h2>
    <h3>My interests are Networks, Security, Cryptography, and Quantum</h3>
  </body>
</HTML>
