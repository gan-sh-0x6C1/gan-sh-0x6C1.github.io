<!DOCTYPE HTML>
<HTML>
  <head>
    <title>Ganesh SK</title>
    <link rel="stylesheet" href="https://github.com/gan-sh-0x6C1/gan-sh-0x6C1.github.io/blob/main/styles.css"/>
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Sofia', cursive, sans-serif;
    color: #f8fafc;
    min-height: 100vh;
    
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(-45deg, darkslategray, darkslateblue, blue, #00ff66);
    background-size: 400% 400%;
    animation: liveGradient 15s ease infinite;
    
    overflow: hidden;
}

@keyframes liveGradient {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

.container {
    background: rgba(10, 15, 30, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 255, 102, 0.2);
    border-radius: 24px;
    padding: 3rem 2rem;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
}

h1 {
    font-size: 3.2rem;
    margin-bottom: 1.5rem;
    font-weight: 400;
    color: #00ff66; /* Hacker green header */
    text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
}

p {
    font-size: 1.25rem;
    line-height: 1.6;
    color: #cbd5e1;
    letter-spacing: 0.5px;
}

@media (prefers-reduced-motion: reduce) {
    body {
        animation: none;
        background-size: 100% 100%;
    }
}
    </style>
  </head>
  <body>
    <h1>H¡, I'm Ganesh</h1>
    <h2>CSE Sophomore at ASEB</h2>
    <h3>My interests are Networks, Security, Cryptography, and Quantum</h3>
  </body>
</HTML>
